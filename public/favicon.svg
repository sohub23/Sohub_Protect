<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <style>
      .icon {
        /* Default (Light mode): Turn the white logo black */
        filter: brightness(0);
      }
      @media (prefers-color-scheme: dark) {
        .icon {
          /* Dark mode: Keep the white logo as is */
          filter: none;
        }
      }
    </style>
  </defs>
  <image class="icon" href="data:image/png;base64," x="0" y="0" width="128" height="128"/>
</svg>